<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Odd Number</title>
    </head>
    <body>
        

        <script>
            var number = prompt('Enter the number');

            // if(number % 2 != 0){
            if(number % 2 == 1){
                document.write('<h1>Odd Number.</h1>');
            } else {
                document.write('<h1>Not a Odd Number.</h1>');
            }
        </script>
    </body>
</html>
