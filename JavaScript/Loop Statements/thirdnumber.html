<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        var number  = prompt('Enter the number');

        for(var i = 1; i <= number; i++){
            if(i % 3 == 0){
                document.write(i+'<br>');
            }
        }

    </script>
</body>
</html>
