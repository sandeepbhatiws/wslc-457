<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <title>Page Title</title>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
    </head>
    <body>
        
        <button onclick="largestValue()">Largest Value</button>
        
        <script>
            var numbers = [11,32,56,22,67,99,54,32,56,21];
            var largest = numbers[0];

            function largestValue(){
                console.log(numbers);
                for(var item of numbers){
                    if(item > largest){
                        largest = item;
                        console.log(item);
                    }
                }
                console.log('Largest Value - '+ largest);
            }


            


        </script>
        
    </body>
</html>
