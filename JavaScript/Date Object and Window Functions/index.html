<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Object and Window Functions</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <div class="outer_date">
        <div class="current_date" id="date"> 12 Feb 2027 </div>

        <div class="outer_time">
            <div class="hours" id="hours"> 4 Hours</div>
            <div class="hours" id="minutes"> 15 Minutes</div>
            <div class="hours" id="seconds"> 15 Seconds</div>
            <div class="hours" id="milliseconds">15 MilliSeconds</div>
        </div>
    </div>

    <button onclick="startTimeOut()"> set Time Out  </button>
    <button onclick="stopTimeOut()"> Clear Time Out  </button>

    <button onclick="startInterval()"> Set Interval  </button>
    <button onclick="stopInterval()"> Clear Interval  </button>

    <script src="js/custom.js"></script>
</body>
</html>
