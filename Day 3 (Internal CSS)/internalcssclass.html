<html>
	<head>
		<title>Div Tags</title>
		<style type="text/css">
			.building{
				background-color: black;
				width: 500px;
				height: 600px;
			}
			.floor1{
				background-color: red;
			}
			.floor2{
				background-color: blue;
			}
			.floor3{
				background-color: orange;
				width: 500px;
				height: 200px;
			}
			.common{
				width: 500px;
				height: 200px;
			}
		</style>
	</head>
	<body>
		<div class="building">
			<div class="floor1 common">
				<center>
					<h1>Home</h1>
				</center>
			</div>

			<div class="floor2 common">
				<div></div>
				<div></div>
			</div>
			
			<div class="floor3">
				<center>
					<b>Contact Us</b>
				</center>
			</div>
		</div>
	</body>
</html>
